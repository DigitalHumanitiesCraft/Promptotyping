<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Living Paper - Interaktives wissenschaftliches Paper über Promptotyping">
  <meta name="author" content="Christopher Pollin">
  <title>Jenseits von Vibe Coding - The Living Paper</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="../prototype/styles.css">
</head>
<body>
  <!-- Fixed Header -->
  <header class="header">
    <span class="header-title">Promptotyping - The Living Paper</span>
  </header>

  <!-- Narrative Navigation -->
  <nav class="narrative-nav" id="narrative-nav" aria-label="Kapitel-Navigation">
    <!-- Will be populated by JavaScript -->
  </nav>

  <!-- Main Content Area -->
  <main class="main-content" id="main-content">
    <!-- Paper content will be injected here by JavaScript -->
    <!-- Interactive Modules (will be positioned within paper content) -->
    <div id="context-rot-viz-container" class="interactive-module" style="display:none;"></div>
    <div id="vault-explorer-container" class="interactive-module" style="display:none;"></div>
    <div id="sycophancy-trap-container" class="interactive-module" style="display:none;"></div>
  </main>

  <!-- Slide-In Panels Container -->
  <div id="slide-panels"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../prototype/app.js"></script>
</body>
</html>
